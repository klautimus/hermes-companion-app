# Hermes Companion — Docker Compose
#
# Usage:
#   docker-compose up -d
#
# Prerequisites:
#   - Hermes Agent running on the host (port 8642)

services:
  companion:
    build:
      context: ./daemon
      dockerfile: Dockerfile
    container_name: hermes-companion
    restart: unless-stopped
    ports:
      - "8777:8777"
    environment:
      - HERMES_API=http://host.docker.internal:8642
    volumes:
      - companion-data:/data
      - ${HOME}/.hermes:/home/companion/.hermes:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8777/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  companion-data:
    driver: local
